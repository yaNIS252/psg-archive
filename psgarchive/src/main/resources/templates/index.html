<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PSG Archive - Recherche Historique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .navbar-psg { background-color: #004170; border-bottom: 4px solid #da291c; }
        .filter-card { background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; }
        .table-psg thead { background-color: #004170; color: white; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-psg navbar-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-shield-shaded"></i> ARCHIVE PSG</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/}" method="get">
                <div class="input-group input-group-lg">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                    <input type="text" name="nom" class="form-control border-start-0" 
                           placeholder="Rechercher un joueur (ex: Raí, Pauleta...)" th:value="${param.nom}">
                    
                    <button class="btn btn-outline-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#filtresAvances">
                        Filtres <i class="bi bi-chevron-down"></i>
                    </button>
                    
                    <button class="btn btn-primary px-4" type="submit">Rechercher</button>
                </div>

                <div class="collapse mt-3" id="filtresAvances">
                    <div class="filter-card p-3">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">Nationalité</label>
                                <select name="nationaliteId" class="form-select">
                                    <option value="">Toutes les nationalités</option>
                                    <option th:each="n : ${lesNationalites}" 
                                            th:value="${n.id_nationalite}" 
                                            th:text="${n.libelle_nationalite}"
                                            th:selected="${param.nationaliteId == n.id_nationalite}"></option>
                                </select>
                            </div>
                            
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">Année d'arrivée</label>
                                <input type="number" name="annee" class="form-control" placeholder="Ex: 1995" th:value="${param.annee}">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small fw-bold">Destination après PSG</label>
                                <select name="clubId" class="form-select">
                                    <option value="">Toutes les destinations</option>
                                    <option th:each="c : ${lesClubs}" 
                                            th:value="${c.id_club}" 
                                            th:text="${c.nom_club}"
                                            th:selected="${param.clubId == c.id_club}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-3 text-end">
                            <a href="/" class="btn btn-link btn-sm text-decoration-none text-muted">Réinitialiser</a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-psg">
                    <tr>
                        <th>Joueur</th>
                        <th>Nationalité</th>
                        <th>Période</th>
                        <th>Destination</th>
                        <th class="text-center">Admin</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="j : ${lesJoueurs}">
                        <td>
                            <div class="fw-bold" th:text="${j.prenom + ' ' + j.nom}"></div>
                            <small class="text-muted">ID: <span th:text="${j.id_joueur}"></span></small>
                        </td>
                        <td th:text="${j.nationalite.libelle_nationalite}"></td>
                        <td>
                            <span class="badge bg-light text-dark border">
                                <span th:text="${j.anneeArrivee}"></span> - 
                                <span th:text="${j.anneeDepart != null ? j.anneeDepart : 'Présent'}"></span>
                            </span>
                        </td>
                        <td>
                            <span th:if="${j.clubDestination != null}" class="text-primary" th:text="${j.clubDestination.nom_club}"></span>
                            <span th:unless="${j.clubDestination != null}" class="text-muted italic small">N/A (Encore au club)</span>
                        </td>
                        <td class="text-center">
                            <i class="bi bi-person-circle text-muted" th:title="${j.createur != null ? j.createur.pseudo : 'Système'}"></i>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
